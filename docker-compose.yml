services:
  # Web UI + API server
  web:
    build: .
    command: uvicorn api.server:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env

  # One-shot CLI analysis (optional)
  # docker compose run cli <token_address>
  cli:
    build: .
    env_file:
      - .env
