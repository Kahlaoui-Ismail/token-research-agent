services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Omit VITE_API_URL — nginx proxies /analyze to the api service,
        # so the browser uses a relative path with no cross-origin issues.
        # Uncomment and set to target a remote API instead:
        # VITE_API_URL: https://api.example.com
    ports:
      - "80:80"
    depends_on:
      - api

  # One-shot CLI analysis — reuses the api image
  # Usage: docker compose run cli <token_address>
  cli:
    build:
      context: .
      dockerfile: api/Dockerfile
    command: ["python", "-m", "agent.main"]
    env_file: .env
